<svg xmlns="http://www.w3.org/2000/svg" version="1.0" width="143pt" height="204pt" viewBox="0 0 143 204" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Degradado para el efecto 3D del marcador verde -->
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#2E7D32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B5E20;stop-opacity:1" />
    </linearGradient>

    <!-- Degradado para el disco rojo central (efecto elevado) -->
    <radialGradient id="redGradient" cx="40%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#FF5252;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#D32F2F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B71C1C;stop-opacity:1" />
    </radialGradient>

    <!-- Sombra lateral derecha para volumen 3D -->
    <linearGradient id="shadowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0" />
      <stop offset="70%" style="stop-color:#000000;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.3" />
    </linearGradient>
  </defs>

